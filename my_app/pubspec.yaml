name: my_app
description: "Hatid — Food Sharing App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  cloud_firestore: ^5.6.7

  # google_fonts — official Flutter/Google package for Playfair Display + Nunito
  # docs: https://pub.dev/packages/google_fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/

  uses-material-design: true